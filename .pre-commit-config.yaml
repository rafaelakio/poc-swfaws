# Hooks do pre-commit.
#
# Observação: o código de produção existente (módulos top-level .py) ainda não
# está formatado conforme as ferramentas abaixo. Para não introduzir grandes
# reformatações neste PR de tooling, os arquivos legados são explicitamente
# excluídos. PRs futuros podem remover as exclusões após a reformatação.
exclude: |
  (?x)^(
    activity_worker\.py|
    decision_worker\.py|
    workflow_starter\.py|
    swf_client\.py|
    config\.py|
    demo\.py|
    setup\.py|
    run\.sh|
    run\.bat|
    terraform/.*|
    (?:.*\.md)
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: ["--line-length=100"]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=100"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]
